<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <link rel="stylesheet" href="css/skins.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark" style="background: rgba(0, 0, 0, 0.808);">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html" style="color: #ff1e3c; font-weight: bold; font-size: 30px;">KatRuined</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="builds_and_runes.html">Builds & Runes</a></li>
                    <li class="nav-item"><a class="nav-link" href="matchups.html">Matchups</a></li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">Other</a>
                        <ul class="dropdown-menu" style="background-color: rgba(46, 0, 0, 0.9);">
                            <li><a class="dropdown-item" href="story.html" style="color: white;">Story</a></li>
                            <li><a class="dropdown-item" href="skins.html" style="color: white;">Skins</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h2 class="skins_title text-center">Skins</h2>
        
        <div class="galeria-haz">
            <div id="nyil"><img src="img/skins/left-arrow.png" alt="Bal"></div>

            <div class="nagy">
                <div class="nagykep">
                    <img src="img/skins/default.webp" alt="Katarina">
                    <img src="img/skins/mercenary.webp" alt="Mercenary Katarina">
                    <img src="img/skins/redcard.webp" alt="Red Card Katarina">
                    <img src="img/skins/bilgewater.webp" alt="Bilgewater Katarina">
                    <img src="img/skins/kittycat.webp" alt="Kitty Cat Katarina">
                    <img src="img/skins/highcommand.webp" alt="High Command Katarina">
                    <img src="img/skins/sandstorm.webp" alt="Sandstorm Katarina">
                    <img src="img/skins/slaybelle.webp" alt="Slay Belle Katarina">
                    <img src="img/skins/warringkingdoms.webp" alt="Warring Kingdoms Katarina">
                    <img src="img/skins/project.webp" alt="Project Katarina">
                    <img src="img/skins/deathsworn.webp" alt="Death Sworn Katarina">
                    <img src="img/skins/battleacademia.webp" alt="Battle Academia Katarina">
                    <img src="img/skins/bloodmoon.webp" alt="Blood Moon Katarina">
                    <img src="img/skins/battlequeen.webp" alt="Battle Queen Katarina">
                    <img src="img/skins/highnoon.webp" alt="High Noon Katarina">
                    <img src="img/skins/faeriecourt.webp" alt="Faerie Court Katarina">
                    <img src="img/skins/pfaeriecourt.webp" alt="Prestige Faerie Court Katarina">
                    <img src="img/skins/chosenofthewolf.webp" alt="Chosen of the Wolf Katarina">
                    <img src="img/skins/pmasqueoftheblackrose.webp" alt="Prestige Masque of the Black Rose Katarina">
                    <img src="img/skins/petalsofspring.webp" alt="Petals of Spring Katarina">
                </div>

                <div class="kepalairas">
                    <div id="all_number"></div>
                    <div class="per">&nbsp;/&nbsp;</div>
                    <div id="active_number"></div>
                    <div class="pont">.&nbsp;&nbsp;&nbsp;&nbsp;</div>
                    <div id="active_image_name"></div>
                </div>
            </div>

            <div id="nyil2"><img src="img/skins/right-arrow.png" alt="Jobb"></div>
        </div>
    </div>

    <footer>
        <p>Készítette: Horváth Arnold</p>
    </footer>

    <script>
        $(document).ready(function () {
            let first_image = $(".nagykep img:first-child");

            $(".nagykep img").css("opacity", "0");
            first_image.addClass("active").css("opacity", "1");

            $("#all_number").text($(".nagykep img").length);
            $("#active_number").text(1);
            $("#active_image_name").text(first_image.attr("alt"));

            $("#nyil2").click(function () {
                let active_image = $(".nagykep img.active");
                let next_image = active_image.next();

                if (next_image.length > 0) {
                    active_image.removeClass("active").animate({ "opacity": "0" }, 500);
                    next_image.addClass("active").animate({ "opacity": "1" }, 500);

                    $("#active_number").text($(".nagykep img").index(next_image) + 1);
                    $("#active_image_name").text(next_image.attr("alt"));
                }
            });

            $("#nyil").click(function () {
                let active_image = $(".nagykep img.active");
                let prev_image = active_image.prev();

                if (prev_image.length > 0) {
                    active_image.removeClass("active").animate({ "opacity": "0" }, 500);
                    prev_image.addClass("active").animate({ "opacity": "1" }, 500);

                    $("#active_number").text($(".nagykep img").index(prev_image) + 1);
                    $("#active_image_name").text(prev_image.attr("alt"));
                }
            });
        });
    </script>
</body>
</html>
